<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>3D Rotate Album</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            /* Chặn browser zoom / highlight / callout trên mobile */
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.045), transparent 22%),
                radial-gradient(circle at center, rgba(255, 255, 255, 0.02), transparent 42%),
                radial-gradient(circle at center, rgba(255, 255, 255, 0.015), transparent 62%);
            pointer-events: none;
            z-index: 0;
        }

        #app,
        #stage {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        #stage {
            z-index: 1;
        }

        .card {
            width: var(--card-w, 148px);
            height: var(--card-h, 204px);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #0f0f0f;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 12px 34px rgba(0, 0, 0, 0.56),
                0 0 22px rgba(255, 255, 255, 0.08);
            opacity: 0;
            will-change: transform, opacity;
            backface-visibility: hidden;
            transition: box-shadow 0.25s ease;
        }

        .card:hover {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.18),
                0 16px 44px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(255, 255, 255, 0.18);
        }

        .card.focused {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.35),
                0 24px 60px rgba(0, 0, 0, 0.7),
                0 0 80px rgba(255, 255, 255, 0.28);
        }

        .card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 30%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 26%, transparent 72%, rgba(255, 255, 255, 0.08));
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            border: 1px solid rgba(255, 255, 255, 0.12);
            pointer-events: none;
        }

        .renderer-root {
            position: absolute;
            inset: 0;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="stage"></div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        // ================================================================
        // 1) THAY ẢNH TẠI ĐÂY - Sẵn 40 slot
        // ================================================================
        const IMAGES = [
            'her/her/cc04026a2c05ad5bf414.jpg',
            'her/cf3f8750a93f2861712e.jpg',
            'her/27ecc885e6ea67b43efb.jpg',
            'her/22d4dfa1f1ce709029df.jpg',
            'her/988d1afa3495b5cbec84.jpg',
            'her/7400c0fe179796c9cf86.jpg',
            'her/d2fc199737f8b6a6efe9.jpg',
            'her/6178497c6713e64dbf02.jpg',
            'her/df55ef2ec141401f1950.jpg',
            'her/70ea929ebcf13daf64e0.jpg',
            'her/c2e71c8f32e0b3beeaf1.jpg',
            'her/eeadcfc1e1ae60f039bf.jpg',
            'her/016f5a00746ff531ac7e.jpg',
            'her/0f6b0a6a2405a55bfc14.jpg',
            'her/866ce603c86c4932107d.jpg',
            'her/6ad7a8297f40fe1ea751.jpg',
            'her/fb54c531eb5e6a00334f.jpg',
            'her/3f03737d5d12dc4c8503.jpg',
            'her/7ff5b99897f716a94fe6.jpg',
            'her/12b6fdb6d3d952870bc8.jpg',
            'her/eba43fa011cf9091c9de.jpg',
            'her/d141d835f65a77042e4b.jpg',
            'her/c157ae31805e0100584f.jpg',
            'her/5d03b807-8c3b-46cd-8f38-e25f16d829a2.jpeg',
            'her/20bf8d0f5a66db388277.jpg',
            'her/f3bf2ebb00d4818ad8c5.jpg',
            'her/e2cbe4c2-f036-4580-a87f-af56a528a85f.jpeg',
            'her/5465b4629a0d1b53421c.jpg',
            'her/209791f2bf9d3ec3678c.jpg',
            'her/d6c7e1b0cfdf4e8117ce.jpg',
            'her/e2e60be1258ea4d0fd9f.jpg',
            'her/09bc45da6bb5eaebb3a4.jpg',
            'her/e4d9d2a905c0849eddd1.jpg',
            'her/9e671b1d3572b42ced63.jpg',
            'her/7c817886a8ef29b170fe.jpg',
            'her/bce4258d0be28abcd3f3.jpg',
            'her/a7ccc8bde6d2678c3ec3.jpg',
            'her/765c89f2579bd6c58f8a.jpg',
            'her/b82e5601886809365079.jpg',
        ];

        // ================================================================
        // 2) CẤU HÌNH CHÍNH - tự thích ứng với kích thước màn hình
        // ================================================================
        function isMobile() {
            return window.innerWidth < 768;
        }
        function isTablet() {
            return window.innerWidth >= 768 && window.innerWidth < 1100;
        }

        function buildConfig() {
            // Giữ các giá trị chung giữa desktop / tablet / mobile
            const common = {
                // Độ phân giải thật sự của card DOM (render ở kích thước lớn rồi
                // scale xuống để khi zoom lên ảnh vẫn nét)
                cardRenderMultiplier: 3,
                itemDuration: 2000,
                itemStagger: 115,
                autoRotateSpeed: 0.35,
                initialPhi: Math.PI / 2,
                initialTheta: -0.55,
                focusDuration: 700,
            };

            if (isMobile()) {
                // Điện thoại (portrait): vòng tròn nhỏ hơn, ít cột hơn để ảnh không bị nhỏ,
                // camera gần hơn, focus mode phóng to rõ hơn vì màn hình nhỏ
                return {
                    ...common,
                    rows: 3,
                    columns: 9,
                    radius: 320,
                    rowGap: 165,
                    cardWidth: 108,
                    cardHeight: 150,
                    minDistance: 260,
                    maxDistance: 1400,
                    initialRadius: 440,
                    focusDistance: 260,
                    focusScale: 1.8,
                };
            }

            if (isTablet()) {
                return {
                    ...common,
                    rows: 3,
                    columns: 11,
                    radius: 440,
                    rowGap: 200,
                    cardWidth: 132,
                    cardHeight: 184,
                    minDistance: 380,
                    maxDistance: 1900,
                    initialRadius: 580,
                    focusDistance: 380,
                    focusScale: 1.5,
                };
            }

            // Desktop
            return {
                ...common,
                rows: 3,
                columns: 13,
                radius: 560,
                rowGap: 235,
                cardWidth: 150,
                cardHeight: 208,
                minDistance: 500,
                maxDistance: 2300,
                initialRadius: 720,
                focusDistance: 460,
                focusScale: 1.35,
            };
        }

        let CONFIG = buildConfig();

        const stage = document.getElementById('stage');

        // FOV lớn hơn trên portrait để thấy rộng hơn
        function getInitialFov() {
            const aspect = window.innerWidth / window.innerHeight;
            if (aspect < 0.7) return 52;   // portrait điện thoại
            if (aspect < 1.2) return 44;   // tablet / vuông
            return 36;                     // desktop landscape
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(getInitialFov(), window.innerWidth / window.innerHeight, 1, 5000);
        const renderer = new CSS3DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.className = 'renderer-root';
        stage.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enablePan = false;
        controls.rotateSpeed = 0.55;
        controls.zoomSpeed = 0.85;
        controls.minDistance = CONFIG.minDistance;
        controls.maxDistance = CONFIG.maxDistance;
        controls.autoRotate = true;
        controls.autoRotateSpeed = CONFIG.autoRotateSpeed;
        controls.target.set(0, 0, 0);

        const albumGroup = new THREE.Group();
        scene.add(albumGroup);

        let cards = [];
        let introStart = performance.now();
        let introActive = true;
        let focusedCard = null;
        let focusAnimation = null;
        let savedAutoRotate = true;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function sphericalToVector(radius, phi, theta) {
            const s = new THREE.Spherical(radius, phi, theta);
            return new THREE.Vector3().setFromSpherical(s);
        }

        function getResponsiveScale() {
            const shortSide = Math.min(window.innerWidth, window.innerHeight);
            return clamp(shortSide / 980, 0.58, 1.08);
        }

        function makeCardElement(src, width, height) {
            const el = document.createElement('div');
            el.className = 'card';
            el.style.setProperty('--card-w', `${width}px`);
            el.style.setProperty('--card-h', `${height}px`);

            const img = document.createElement('img');
            img.src = src;
            img.alt = 'Album image';
            img.draggable = false;
            el.appendChild(img);
            return el;
        }

        function clearAlbum() {
            cards.forEach((item) => albumGroup.remove(item.object));
            cards = [];
        }

        function buildAlbum() {
            clearAlbum();

            const scale = getResponsiveScale();
            const cardWidth = CONFIG.cardWidth * scale;
            const cardHeight = CONFIG.cardHeight * scale;
            const radius = CONFIG.radius * scale;
            const rowGap = CONFIG.rowGap * scale;
            const angleStep = (Math.PI * 2) / CONFIG.columns;
            const rowCenter = (CONFIG.rows - 1) / 2;

            // Tạo danh sách tất cả vị trí, sort theo thứ tự xuất hiện:
            // ảnh gần góc nhìn ban đầu nhất hiện trước, lan dần ra
            const slots = [];
            for (let row = 0; row < CONFIG.rows; row++) {
                const y = (row - rowCenter) * rowGap;
                const angleOffset = row % 2 === 0 ? 0 : angleStep / 2;

                for (let column = 0; column < CONFIG.columns; column++) {
                    const angle = column * angleStep + angleOffset;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;

                    const viewTheta = -CONFIG.initialTheta;
                    let delta = Math.abs(angle - viewTheta);
                    delta = Math.min(delta, Math.PI * 2 - delta);
                    const sortKey = delta * 100 + Math.abs(row - rowCenter) * 2;

                    slots.push({ row, column, x, y, z, angle, sortKey });
                }
            }

            slots.sort((a, b) => a.sortKey - b.sortKey);

            slots.forEach((slot, orderIndex) => {
                if (orderIndex >= IMAGES.length) return;

                const src = IMAGES[orderIndex];
                // Render DOM của card ở kích thước lớn (×multiplier) để ảnh nét khi zoom.
                // Bù lại bằng cách thu nhỏ CSS3DObject xuống 1/multiplier.
                const mult = CONFIG.cardRenderMultiplier;
                const element = makeCardElement(src, cardWidth * mult, cardHeight * mult);
                const object = new CSS3DObject(element);
                const baseScale = 1 / mult;

                const targetPosition = new THREE.Vector3(slot.x, slot.y, slot.z);
                const targetLook = new THREE.Object3D();
                targetLook.position.copy(targetPosition);
                targetLook.lookAt(new THREE.Vector3(0, slot.y, 0));
                const targetQuaternion = targetLook.quaternion.clone();

                // Vị trí xuất phát: bay từ một hướng ngẫu nhiên xung quanh vị trí đích.
                // Chọn hướng đều trên mặt cầu (spherical random direction) rồi đẩy ra xa.
                const flyDistance = 900 + Math.random() * 500;
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1); // phân bố đều trên mặt cầu
                const dir = new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta),
                    Math.cos(phi),
                    Math.sin(phi) * Math.sin(theta)
                );
                const startPosition = targetPosition.clone().add(dir.multiplyScalar(flyDistance));

                // Xoay xuất phát: lệch ngẫu nhiên nhiều chiều, xoay dần về đúng hướng
                const startRotator = new THREE.Object3D();
                startRotator.quaternion.copy(targetQuaternion);
                startRotator.rotateY(THREE.MathUtils.degToRad((Math.random() - 0.5) * 200));
                startRotator.rotateX(THREE.MathUtils.degToRad((Math.random() - 0.5) * 140));
                startRotator.rotateZ(THREE.MathUtils.degToRad((Math.random() - 0.5) * 120));
                const startQuaternion = startRotator.quaternion.clone();

                object.position.copy(startPosition);
                object.quaternion.copy(startQuaternion);
                object.scale.setScalar(0.3 * baseScale);
                element.style.opacity = '0';

                const cardData = {
                    object,
                    element,
                    introOrder: orderIndex,
                    startPosition,
                    targetPosition,
                    startQuaternion,
                    targetQuaternion,
                    baseScale,
                    isFocused: false,
                };

                // Gán element với card để tìm ngược lại được từ DOM click target
                element.__cardData = cardData;

                albumGroup.add(object);
                cards.push(cardData);
            });
        }

        function updateCardsIntro(progressMs) {
            let allDone = true;
            cards.forEach((card) => {
                const startAt = card.introOrder * CONFIG.itemStagger;
                const local = clamp((progressMs - startAt) / CONFIG.itemDuration, 0, 1);
                if (local < 1) allDone = false;

                const easedPos = easeOutCubic(local);
                const easedScale = easeOutBack(local);

                card.object.position.lerpVectors(card.startPosition, card.targetPosition, easedPos);
                card.object.quaternion.copy(card.startQuaternion).slerp(card.targetQuaternion, easedPos);
                card.object.scale.setScalar(lerp(0.3 * card.baseScale, card.baseScale, easedScale));
                card.element.style.opacity = String(easedPos);
            });
            return allDone;
        }

        // ================================================================
        // 3) CLICK ẢNH -> NHẢY LÊN TRƯỚC MẶT
        // ================================================================
        function computeFocusTransform(card) {
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            const focusPos = camera.position.clone().add(forward.multiplyScalar(CONFIG.focusDistance));

            const lookHelper = new THREE.Object3D();
            lookHelper.position.copy(focusPos);
            lookHelper.lookAt(camera.position);
            const focusQuat = lookHelper.quaternion.clone();

            return {
                position: focusPos,
                quaternion: focusQuat,
                scale: CONFIG.focusScale * card.baseScale,
            };
        }

        function startFocusAnimation(card, toState, onDone) {
            focusAnimation = {
                card,
                startTime: performance.now(),
                from: {
                    position: card.object.position.clone(),
                    quaternion: card.object.quaternion.clone(),
                    scale: card.object.scale.x,
                },
                to: toState,
                onDone,
            };
        }

        function onCardClick(card) {
            if (introActive) return;
            if (focusAnimation) return;

            if (focusedCard === card) {
                unfocusCard(card);
            } else if (focusedCard) {
                const previous = focusedCard;
                unfocusCard(previous, () => focusCard(card));
            } else {
                focusCard(card);
            }
        }

        function focusCard(card) {
            savedAutoRotate = controls.autoRotate;
            controls.autoRotate = false;
            focusedCard = card;
            card.isFocused = true;
            card.element.classList.add('focused');

            // Đưa card ra scene gốc để không bị xoay cùng albumGroup
            const worldPos = new THREE.Vector3();
            const worldQuat = new THREE.Quaternion();
            card.object.getWorldPosition(worldPos);
            card.object.getWorldQuaternion(worldQuat);
            albumGroup.remove(card.object);
            scene.add(card.object);
            card.object.position.copy(worldPos);
            card.object.quaternion.copy(worldQuat);

            const target = computeFocusTransform(card);
            startFocusAnimation(card, target);
        }

        function unfocusCard(card, onDone) {
            card.element.classList.remove('focused');

            // Tính vị trí/xoay đích dựa trên trạng thái hiện tại của albumGroup
            const targetWorldPos = card.targetPosition.clone().applyMatrix4(albumGroup.matrixWorld);
            const groupQuat = new THREE.Quaternion();
            albumGroup.getWorldQuaternion(groupQuat);
            const targetWorldQuat = groupQuat.clone().multiply(card.targetQuaternion);

            startFocusAnimation(card, {
                position: targetWorldPos,
                quaternion: targetWorldQuat,
                scale: card.baseScale,
            }, () => {
                scene.remove(card.object);
                card.object.position.copy(card.targetPosition);
                card.object.quaternion.copy(card.targetQuaternion);
                card.object.scale.setScalar(card.baseScale);
                albumGroup.add(card.object);
                card.isFocused = false;
                if (focusedCard === card) focusedCard = null;
                controls.autoRotate = savedAutoRotate;
                if (onDone) onDone();
            });
        }

        function updateFocusAnimation(now) {
            if (!focusAnimation) return;
            const a = focusAnimation;
            const t = clamp((now - a.startTime) / CONFIG.focusDuration, 0, 1);
            const e = easeInOutCubic(t);

            a.card.object.position.lerpVectors(a.from.position, a.to.position, e);
            a.card.object.quaternion.copy(a.from.quaternion).slerp(a.to.quaternion, e);
            a.card.object.scale.setScalar(lerp(a.from.scale, a.to.scale, e));

            if (t >= 1) {
                const done = a.onDone;
                focusAnimation = null;
                if (done) done();
            }
        }

        // Nếu user xoay/zoom khi đang focus, cập nhật card bám theo camera
        function updateFocusedCardTracking() {
            if (!focusedCard || focusAnimation) return;
            const t = computeFocusTransform(focusedCard);
            focusedCard.object.position.copy(t.position);
            focusedCard.object.quaternion.copy(t.quaternion);
        }

        function placeCameraAtInitialView() {
            const position = sphericalToVector(
                CONFIG.initialRadius,
                CONFIG.initialPhi,
                CONFIG.initialTheta
            );
            camera.position.copy(position);
            camera.lookAt(controls.target);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();

            if (introActive) {
                const elapsed = now - introStart;
                const done = updateCardsIntro(elapsed);
                if (done) {
                    introActive = false;
                    cards.forEach((card) => {
                        card.object.position.copy(card.targetPosition);
                        card.object.quaternion.copy(card.targetQuaternion);
                        card.object.scale.setScalar(card.baseScale);
                        card.element.style.opacity = '1';
                    });
                }
            }

            updateFocusAnimation(now);
            controls.update();
            updateFocusedCardTracking();
            renderer.render(scene, camera);
        }

        function resize() {
            // Rebuild CONFIG nếu breakpoint đổi (vd xoay ngang/dọc điện thoại)
            const oldRows = CONFIG.rows;
            const oldColumns = CONFIG.columns;
            const oldRadius = CONFIG.radius;
            CONFIG = buildConfig();
            const breakpointChanged =
                oldRows !== CONFIG.rows ||
                oldColumns !== CONFIG.columns ||
                oldRadius !== CONFIG.radius;

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.fov = getInitialFov();
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Cập nhật giới hạn zoom theo config mới
            controls.minDistance = CONFIG.minDistance;
            controls.maxDistance = CONFIG.maxDistance;
            controls.autoRotateSpeed = CONFIG.autoRotateSpeed;

            // Nếu đang focus, thả ảnh về trước khi rebuild
            if (focusedCard && !focusAnimation) {
                // Trả trực tiếp về grid, không animate
                scene.remove(focusedCard.object);
                focusedCard.element.classList.remove('focused');
                focusedCard.isFocused = false;
                albumGroup.add(focusedCard.object);
                controls.autoRotate = savedAutoRotate;
                focusedCard = null;
            }

            if (introActive || breakpointChanged) {
                buildAlbum();
                if (introActive) {
                    const elapsed = performance.now() - introStart;
                    updateCardsIntro(elapsed);
                }
                // Nếu breakpoint đổi và đã xong intro, đặt thẳng về vị trí cuối
                if (!introActive) {
                    cards.forEach((card) => {
                        card.object.position.copy(card.targetPosition);
                        card.object.quaternion.copy(card.targetQuaternion);
                        card.object.scale.setScalar(card.baseScale);
                        card.element.style.opacity = '1';
                    });
                    // Dịch camera về bán kính mới nhưng giữ hướng đang nhìn
                    const offset = new THREE.Vector3().copy(camera.position).sub(controls.target);
                    const sph = new THREE.Spherical().setFromVector3(offset);
                    sph.radius = clamp(CONFIG.initialRadius, CONFIG.minDistance, CONFIG.maxDistance);
                    camera.position.copy(new THREE.Vector3().setFromSpherical(sph));
                    controls.update();
                }
            }
        }

        // Tìm cardData từ một DOM element bất kỳ (đi lên cây DOM tìm element có __cardData)
        function findCardFromElement(el) {
            while (el && el !== document.body) {
                if (el.__cardData) return el.__cardData;
                el = el.parentElement;
            }
            return null;
        }

        // Bắt pointer ở phase capture trên window để chạy TRƯỚC OrbitControls.
        // Phân biệt click vs drag bằng khoảng cách giữa pointerdown và pointerup.
        let pointerDownX = 0;
        let pointerDownY = 0;
        let pointerDownTime = 0;
        let pointerDownOnCard = null;

        window.addEventListener('pointerdown', (e) => {
            pointerDownX = e.clientX;
            pointerDownY = e.clientY;
            pointerDownTime = performance.now();
            // Tìm xem pointer bấm xuống có trúng card nào không
            const hit = document.elementFromPoint(e.clientX, e.clientY);
            pointerDownOnCard = findCardFromElement(hit);
        }, true);

        window.addEventListener('pointerup', (e) => {
            const dx = e.clientX - pointerDownX;
            const dy = e.clientY - pointerDownY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const dt = performance.now() - pointerDownTime;

            // Click thật: pointer gần như đứng yên + thời gian ngắn
            if (dist < 8 && dt < 500) {
                const hit = document.elementFromPoint(e.clientX, e.clientY);
                const card = findCardFromElement(hit);

                if (card && card === pointerDownOnCard) {
                    // Click trúng card
                    onCardClick(card);
                } else if (!card && focusedCard && !focusAnimation && !introActive) {
                    // Click ra nền khi đang focus -> trả về
                    unfocusCard(focusedCard);
                }
            }

            pointerDownOnCard = null;
        }, true);

        // Debounce resize để tránh rebuild liên tục (iOS address bar, xoay máy...)
        let resizeTimer = null;
        function handleResize() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resize, 120);
        }
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);

        buildAlbum();
        placeCameraAtInitialView();
        animate();
    </script>
</body>

</html>
